<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassGuard - 실습 PC 모니터링 및 제어</title>
  <!-- Outfit & Inter 구글 폰트 적용 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icon 라이브러리 사용 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 전체 감싸기 -->
  <div class="app-container">
    
    <!-- 1. 헤더 (Header) -->
    <header class="main-header">
      <div class="header-logo">
        <div class="logo-icon">
          <i data-lucide="shield-check"></i>
        </div>
        <div class="logo-text">
          <h1>ClassGuard</h1>
        </div>
      </div>

      <!-- 강의실 탭 리스트 (관리자가 설정한 교실만 시각적 active 탭 고정, 클릭 변경 불가) -->
      <div class="classroom-tabs" id="classroom-tabs">
        <button class="tab-btn" data-room="ai_1">AI융합실습실 1실</button>
        <button class="tab-btn" data-room="ai_2">AI융합실습실 2실</button>
        <button class="tab-btn" data-room="ai_3">AI융합실습실 3실</button>
        <button class="tab-btn" data-room="ai_4">AI융합실습실 4실</button>
      </div>

      <!-- 통계 위젯 -->
      <div class="stats-container">
        <div class="stat-badge total-badge">
          <span class="stat-label">등록 PC</span>
          <span class="stat-value" id="stat-total">0</span>
        </div>
        <div class="stat-badge online-badge">
          <span class="stat-label">온라인</span>
          <span class="stat-value" id="stat-online">0</span>
        </div>
      </div>

      <!-- 우측 설정 컨트롤 단추 -->
      <div class="header-controls">
        <button class="btn-config" id="btn-config-classroom" title="실습실 고정 설정" style="background:none; border:none; color:var(--text-muted); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0.5rem; border-radius:8px; transition:background 0.2s;">
          <i data-lucide="settings" style="width:1.35rem; height:1.35rem;"></i>
        </button>
      </div>
    </header>

    <!-- 2. 바디 콘텐츠 -->
    <main class="main-content">
      <!-- 학생 화면 바둑판 그리드 -->
      <div class="grid-layout" id="students-grid">
        <div class="no-students">
          <i data-lucide="monitor-off" class="empty-icon"></i>
          <p>관제 실습실 대기 중</p>
          <span class="empty-sub">상단의 AI융합실습실 탭 중 하나를 선택하면 관제 신호(비콘) 송출이 개시됩니다.</span>
        </div>
      </div>
    </main>

  </div>



  <!-- 전체화면 이미지 확대 모달 overlay -->
  <div id="image-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000000; z-index:9999; align-items:center; justify-content:center;">
    <div style="position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
      <!-- 플로팅 닫기 버튼 -->
      <button id="close-modal" style="position:absolute; top:20px; right:20px; background:rgba(0,0,0,0.6); border:none; color:#ffffff; font-size:2rem; width:3.5rem; height:3.5rem; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; outline:none; font-family:sans-serif; z-index:10000; border:1px solid rgba(255,255,255,0.2);">&times;</button>
      
      <!-- 플로팅 PC 타이틀 라벨 -->
      <div id="modal-title" style="position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.6); color:#ffffff; font-weight:800; font-size:1.1rem; padding:0.5rem 1.2rem; border-radius:30px; font-family:'Outfit',sans-serif; z-index:10000; border:1px solid rgba(255,255,255,0.2);">PC 화면 실시간 확대</div>
      
      <!-- 화면 꽉 채움 이미지 (비율 자동 매칭) -->
      <img id="modal-img" src="" style="width:100%; height:100%; object-fit:contain; background:#000000;">
    </div>
  </div>

  <!-- Socket.io 라이브러리 로드 -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- 프론트엔드 비즈니스 로직 -->
  <script src="app.js"></script>
</body>
</html>
